name: Send EV Alerts to Telegram

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scan-and-alert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome for web scraping
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser

    - name: Run scanner and send alerts
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        FREE_CHANNEL_ID: ${{ secrets.FREE_CHANNEL_ID }}
        PREMIUM_CHANNEL_ID: ${{ secrets.PREMIUM_CHANNEL_ID }}
      run: |
        python send_ev_alerts.py
