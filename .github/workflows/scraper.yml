name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install Chrome dependencies
      run: |
        sudo apt-get update
        
        # Install essential build tools
        sudo apt-get install -y \
          python3-dev \
          build-essential \
          wget \
          unzip \
          curl \
          xvfb
        
        # Install Chrome dependencies
        sudo apt-get install -y \
          libnss3 \
          libatk-bridge2.0-0t64 \
          libx11-xcb1 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libgbm1 \
          libasound2t64 \
          libpangocairo-1.0-0 \
          libpango-1.0-0 \
          libcairo2 \
          libgdk-pixbuf2.0-0 \
          libgtk-3-0
        
        echo "✅ Chrome dependencies installed"

    # Step 4: Setup Chrome
    - name: 🌐 Setup Chrome
      run: |
        echo "=== Setting up Chrome ==="
        
        # Install Chrome
        wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt-get install -y /tmp/chrome.deb
        
        echo "Chrome version:"
        google-chrome --version || echo "Chrome check"
        
        # Setup Xvfb for headless mode
        echo "Starting Xvfb..."
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        export DISPLAY=:99
        
        echo "✅ Chrome setup complete"

    # Step 5: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install rich==12.6.0
        pip install webdriver-manager==4.0.1

    # Step 6: Install R and essential packages (FIXED - required for RStatsResolver)
    - name: 📦 Install R and packages
      run: |
        echo "=== Installing R ==="
        
        # Install R
        sudo apt-get install -y r-base r-base-core
        
        # Verify R installation
        echo "R version:"
        R --version || echo "R not found"
        echo "Rscript path:"
        which Rscript || echo "Rscript not found"
        
        # Install minimal R packages
        echo "Installing R packages..."
        Rscript -e "
        # Create user library
        dir.create('~/R/library', recursive = TRUE, showWarnings = FALSE)
        .libPaths(c('~/R/library', .libPaths()))
        
        # Install essential packages
        install.packages('jsonlite', lib = '~/R/library', repos = 'https://cloud.r-project.org')
        install.packages('httr', lib = '~/R/library', repos = 'https://cloud.r-project.org')
        
        cat('\\n✅ R packages installed\\n')
        "

    # Step 7: Create CI patch
    - name: 🔧 Create CI Patch
      run: |
        echo "=== Creating CI patch ==="
        
        cat > ci_patch.py << 'EOF'
        """
        CI patch for GitHub Actions
        """
        import os
        
        def apply_ci_fix():
            """Apply CI fixes"""
            print("=== APPLYING CI FIX ===")
            
            # Set display for Chrome
            os.environ['DISPLAY'] = ':99'
            print("✅ DISPLAY set to :99")
            
            # Fix for RStatsResolver in CI
            try:
                # Check if Rscript is available
                import subprocess
                result = subprocess.run(['which', 'Rscript'], capture_output=True, text=True)
                if result.returncode == 0:
                    print(f"✅ Rscript found at: {result.stdout.strip()}")
                else:
                    print("⚠️ Rscript not found, trying to locate...")
                    # Try to find Rscript
                    import shutil
                    rscript_path = shutil.which('Rscript')
                    if rscript_path:
                        print(f"✅ Found Rscript at: {rscript_path}")
                    else:
                        print("❌ Rscript not available")
            except Exception as e:
                print(f"⚠️ Rscript check failed: {e}")
        
        # Apply the fix
        apply_ci_fix()
        EOF
        
        echo "✅ CI patch created"

    # Step 8: Run the Enhanced Paper Trading System
    - name: 🎯 Run Enhanced Paper Trading System
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        DISPLAY: ':99'
      run: |
        echo "🚀 Running Enhanced Paper Trading System"
        echo "=========================================="
        echo "Current time: $(date)"
        
        # Create runner with R validation
        cat > runner.py << 'EOF'
        import os
        import sys
        import traceback
        import subprocess
        from datetime import datetime
        
        # Setup
        os.environ['DISPLAY'] = ':99'
        sys.path.insert(0, os.getcwd())
        
        print("=" * 60)
        print("ENHANCED PAPER TRADING SYSTEM")
        print(f"Started: {datetime.now()}")
        print("=" * 60)
        
        def check_r_installation():
            """Check if R is properly installed"""
            print("Checking R installation...")
            
            try:
                # Check Rscript
                result = subprocess.run(['which', 'Rscript'], capture_output=True, text=True)
                if result.returncode == 0:
                    rscript_path = result.stdout.strip()
                    print(f"✅ Rscript found: {rscript_path}")
                    
                    # Check Rscript works
                    version_result = subprocess.run(['Rscript', '--version'], capture_output=True, text=True)
                    if version_result.returncode == 0:
                        print(f"✅ Rscript version: {version_result.stdout.split()[2]}")
                        return True
                    else:
                        print("❌ Rscript not working")
                        return False
                else:
                    print("❌ Rscript not found")
                    return False
                    
            except Exception as e:
                print(f"❌ R check failed: {e}")
                return False
        
        def main():
            try:
                # Apply CI fix
                try:
                    import ci_patch
                    print("CI patch applied")
                except:
                    print("CI patch skipped")
                
                # Check R installation
                if not check_r_installation():
                    print("\\n⚠️ R not properly installed. Trying to continue anyway...")
                
                # Import system
                print("\\nInitializing system...")
                from enhanced_paper_trading import EnhancedPaperTradingSystem
                
                system = EnhancedPaperTradingSystem()
                print(f"✅ System initialized")
                print(f"Bankroll: €{system.bankroll:.2f}")
                
                # Run scanning
                print("\\nRunning automated scanning...")
                try:
                    system.automated_scanning(max_scans=1)
                    print("✅ Scanning completed")
                except Exception as e:
                    print(f"⚠️ Scanning issue: {e}")
                
                # Resolve bets
                print("\\nResolving pending bets...")
                try:
                    system._resolve_pending()
                    print("✅ Bet resolution completed")
                except Exception as e:
                    print(f"❌ Bet resolution failed: {e}")
                    traceback.print_exc()
                
                # Summary
                print("\\nSummary:")
                try:
                    stats = system.db.get_performance_stats()
                    print(f"Bankroll: €{system.bankroll:.2f}")
                    print(f"Total Bets: {stats.get('total_bets', 0)}")
                    print(f"Won: {stats.get('won_bets', 0)} | Lost: {stats.get('lost_bets', 0)}")
                    print(f"Pending: {len(system.db.get_pending_bets())}")
                except:
                    print("Summary unavailable")
                
                print("\\n" + "=" * 60)
                print(f"COMPLETED: {datetime.now()}")
                print("✅ Workflow done!")
                print("=" * 60)
                
                return True
                
            except Exception as e:
                print(f"\\n❌ ERROR: {e}")
                traceback.print_exc()
                return False
        
        if __name__ == "__main__":
            success = main()
            sys.exit(0 if success else 1)
        EOF
        
        # Run it
        echo "\\n=== EXECUTING ==="
        python runner.py
        
        EXIT_CODE=$?
        
        if [ $EXIT_CODE -eq 0 ]; then
            echo "\\n✅ SUCCESS!"
        else
            echo "\\n⚠️ Had errors"
            
            # Fallback with R check
            echo "\\n=== FALLBACK WITH R CHECK ==="
            python3 -c "
            import os
            import subprocess
            import sys
            sys.path.insert(0, os.getcwd())
            
            print('Checking R installation...')
            result = subprocess.run(['which', 'Rscript'], capture_output=True, text=True)
            if result.returncode == 0:
                print(f'Rscript found: {result.stdout.strip()}')
                try:
                    from enhanced_paper_trading import EnhancedPaperTradingSystem
                    system = EnhancedPaperTradingSystem()
                    print(f'System: €{system.bankroll:.2f}')
                    print('Fallback completed')
                except Exception as e:
                    print(f'System init failed: {e}')
            else:
                print('❌ Rscript not found. Installing R...')
                import subprocess
                subprocess.run(['sudo', 'apt-get', 'install', '-y', 'r-base', 'r-base-core'], check=False)
                subprocess.run(['Rscript', '-e', \"install.packages('jsonlite', repos='https://cloud.r-project.org')\"], check=False)
                print('R installed, try again next run')
            "
        fi
        
        echo "\\n🏁 Finished!"
