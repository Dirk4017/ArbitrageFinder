name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          build-essential \
          wget \
          unzip \
          curl \
          xvfb \
          libnss3 \
          libatk-bridge2.0-0 \
          libdrm2 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libgbm1 \
          libpango-1.0-0 \
          libcairo2 \
          libasound2 \
          libxshmfence1

    # Step 4: Setup Chrome with CI optimizations
    - name: 🌐 Setup Chrome for CI
      run: |
        echo "=== Setting up Chrome for CI ==="
        
        # Install Chrome from Google's official repository
        wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt-get install -y /tmp/chrome.deb
        
        # Install ChromeDriver via webdriver-manager (will be done by Python)
        pip install webdriver-manager==4.0.1
        
        # Setup Xvfb display for headless Chrome
        echo "Starting Xvfb display server..."
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        export DISPLAY=:99
        
        echo "✅ Chrome setup complete"

    # Step 5: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install rich==12.6.0
        pip install webdriver-manager==4.0.1

    # Step 6: Install R packages (simplified)
    - name: 📦 Install R packages
      run: |
        echo "=== Installing R packages ==="
        
        # Install R if not already installed
        sudo apt-get install -y r-base r-base-dev
        
        # Install required system libraries
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
        
        # Install R packages
        Rscript -e "
        # Create user library
        dir.create('~/R/library', recursive = TRUE, showWarnings = FALSE)
        .libPaths(c('~/R/library', .libPaths()))
        
        # Install packages
        install.packages(c('jsonlite', 'httr', 'dplyr', 'lubridate', 'stringr'), 
                        lib = '~/R/library', 
                        repos = 'https://cloud.r-project.org')
        
        # Try to install sports packages
        tryCatch({
          install.packages('nflreadr', lib = '~/R/library', repos = 'https://cloud.r-project.org')
        }, error = function(e) cat('nflreadr installation failed\\n'))
        
        tryCatch({
          install.packages('hoopR', lib = '~/R/library', repos = 'https://cloud.r-project.org')
        }, error = function(e) cat('hoopR installation failed\\n'))
        "

    # Step 7: Create CI-optimized scraper patch
    - name: 🔧 Create CI Scraper Patch
      run: |
        echo "=== Creating CI-optimized scraper ==="
        
        cat > ci_scraper_patch.py << 'EOF'
        """
        CI-optimized patch for UltraStableScanner
        This monkey-patches the scraper to work better in GitHub Actions
        """
        import os
        from selenium import webdriver
        from selenium.webdriver.chrome.options import Options
        
        def patch_ultra_stable_scanner():
            """Patch the UltraStableScanner for CI"""
            print("=== PATCHING SCRAPER FOR CI ===")
            
            # Store original initialize_webdriver method
            try:
                from scraper.ultra_stable_scanner import UltraStableScanner
                original_init = UltraStableScanner.initialize_webdriver
            except ImportError:
                print("⚠️ Could not import UltraStableScanner")
                return
            
            def ci_initialize_webdriver(self):
                """CI-optimized WebDriver initialization"""
                try:
                    # Close existing driver if any
                    if self.driver:
                        try:
                            self.driver.quit()
                        except:
                            pass
                        self.driver = None
                    
                    print("Initializing CI-optimized Chrome driver...")
                    
                    chrome_options = Options()
                    
                    # ESSENTIAL for CI
                    chrome_options.add_argument("--no-sandbox")
                    chrome_options.add_argument("--disable-dev-shm-usage")
                    chrome_options.add_argument("--disable-gpu")
                    chrome_options.add_argument("--window-size=1920,1080")
                    
                    # CRITICAL: Use new headless mode in CI
                    chrome_options.add_argument("--headless=new")
                    
                    # Anti-detection
                    chrome_options.add_argument("--disable-blink-features=AutomationControlled")
                    chrome_options.add_experimental_option("excludeSwitches", ["enable-automation"])
                    chrome_options.add_experimental_option('useAutomationExtension', False)
                    
                    # Performance optimizations for CI
                    chrome_options.add_argument("--disable-extensions")
                    chrome_options.add_argument("--disable-background-timer-throttling")
                    chrome_options.add_argument("--disable-backgrounding-occluded-windows")
                    chrome_options.add_argument("--disable-renderer-backgrounding")
                    
                    # User agent
                    chrome_options.add_argument("--user-agent=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
                    
                    # Disable features that cause timeouts
                    chrome_options.add_argument("--disable-dev-shm-usage")
                    chrome_options.add_argument("--disable-software-rasterizer")
                    chrome_options.add_argument("--disable-features=VizDisplayCompositor")
                    
                    # Use webdriver-manager for ChromeDriver
                    try:
                        from webdriver_manager.chrome import ChromeDriverManager
                        from selenium.webdriver.chrome.service import Service as ChromeService
                        
                        print("Using webdriver-manager for ChromeDriver...")
                        service = ChromeService(ChromeDriverManager().install())
                        driver = webdriver.Chrome(service=service, options=chrome_options)
                    except Exception as e:
                        print(f"webdriver-manager failed, falling back: {e}")
                        driver = webdriver.Chrome(options=chrome_options)
                    
                    # Set longer timeouts for CI
                    driver.set_page_load_timeout(90)  # 90 seconds
                    driver.implicitly_wait(20)
                    
                    # Hide automation
                    driver.execute_cdp_cmd('Page.addScriptToEvaluateOnNewDocument', {
                        'source': '''
                            Object.defineProperty(navigator, 'webdriver', {
                                get: () => undefined
                            });
                            window.chrome = { runtime: {} };
                        '''
                    })
                    
                    print("✅ CI-optimized WebDriver initialized")
                    return driver
                    
                except Exception as e:
                    print(f"❌ CI WebDriver initialization failed: {e}")
                    return None
            
            # Apply the patch
            UltraStableScanner.initialize_webdriver = ci_initialize_webdriver
            print("✅ UltraStableScanner patched for CI")
        
        # Apply patch
        patch_ultra_stable_scanner()
        EOF
        
        echo "✅ CI scraper patch created"

    # Step 8: Run the Enhanced Paper Trading System with CI fixes
    - name: 🎯 Run Enhanced Paper Trading System
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        DISPLAY: ':99'  # REQUIRED for Chrome in CI
      run: |
        echo "🚀 Running Enhanced Paper Trading System"
        echo "=========================================="
        echo "Current time: $(date)"
        
        # Create the main runner with all fixes
        cat > run_ci_optimized.py << 'EOF'
        import os
        import sys
        import time
        import logging
        import traceback
        from datetime import datetime
        
        # Setup environment for CI
        os.environ['DISPLAY'] = ':99'
        sys.path.insert(0, os.getcwd())
        
        # Setup logging
        logging.basicConfig(
            level=logging.INFO,
            format='%(asctime)s - %(name)s - %(levelname)s - %(message)s',
            handlers=[logging.StreamHandler()]
        )
        logger = logging.getLogger(__name__)
        
        print("=" * 60)
        print("ENHANCED PAPER TRADING - CI OPTIMIZED")
        print(f"Started: {datetime.now()}")
        print("=" * 60)
        
        def apply_ci_fixes():
            """Apply all CI-specific fixes before running"""
            print("\\n=== APPLYING CI FIXES ===")
            
            # 1. Apply scraper patch
            try:
                import ci_scraper_patch
                print("✅ CI scraper patch applied")
            except Exception as e:
                print(f"⚠️ CI scraper patch failed: {e}")
            
            # 2. Fix datetime bug in enhanced_paper_trading
            try:
                import enhanced_paper_trading as ep_module
                
                # Check if _is_future_game has the datetime bug
                import inspect
                source = inspect.getsource(ep_module.EnhancedPaperTradingSystem._is_future_game)
                if 'datetime' in source and 'import' not in source.split('datetime')[0][-10:]:
                    print("Fixing datetime bug in _is_future_game...")
                    
                    # Monkey-patch the method
                    original_method = ep_module.EnhancedPaperTradingSystem._is_future_game
                    
                    def patched_is_future_game(self, game_date: str) -> bool:
                        """Patched version with proper datetime import"""
                        if not game_date:
                            return False
                        
                        try:
                            from datetime import datetime, timedelta
                            
                            # Parse the game date
                            if ' ' in str(game_date):
                                game_date_obj = datetime.strptime(str(game_date), '%Y-%m-%d %H:%M:%S')
                            else:
                                game_date_obj = datetime.strptime(str(game_date), '%Y-%m-%d')
                                game_date_obj = game_date_obj.replace(hour=20, minute=0, second=0)
                            
                            current_time = datetime.now()
                            time_buffer = timedelta(hours=3)
                            future_cutoff = game_date_obj + time_buffer
                            
                            if current_time < future_cutoff:
                                return True
                            
                            return False
                            
                        except Exception as e:
                            print(f"Could not parse game date '{game_date}': {e}")
                            return True
                    
                    ep_module.EnhancedPaperTradingSystem._is_future_game = patched_is_future_game
                    print("✅ Datetime bug fixed")
                else:
                    print("✅ No datetime bug found")
                    
            except Exception as e:
                print(f"⚠️ Datetime fix failed: {e}")
        
        def run_system():
            """Run the Enhanced Paper Trading System"""
            print("\\n=== INITIALIZING SYSTEM ===")
            
            try:
                # Apply CI fixes first
                apply_ci_fixes()
                
                # Import after fixes are applied
                from enhanced_paper_trading import EnhancedPaperTradingSystem
                
                # Initialize system
                print("Initializing EnhancedPaperTradingSystem...")
                system = EnhancedPaperTradingSystem()
                print(f"✅ System initialized | Bankroll: €{system.bankroll:.2f}")
                
                return system
                
            except Exception as e:
                print(f"❌ System initialization failed: {e}")
                traceback.print_exc()
                return None
        
        def run_automated_tasks(system):
            """Run all automated tasks"""
            print("\\n=== RUNNING AUTOMATED TASKS ===")
            
            # TASK 1: Automated scanning
            print("\\n1. AUTOMATED SCANNING")
            print("-" * 40)
            
            scanning_success = False
            try:
                if hasattr(system, 'automated_scanning'):
                    print("Running automated_scanning(max_scans=1)...")
                    
                    # Test website accessibility first
                    print("Checking website accessibility...")
                    try:
                        import requests
                        response = requests.get('https://crazyninjaodds.com', timeout=10)
                        if response.status_code == 200:
                            print("✅ Website is accessible")
                        else:
                            print(f"⚠️ Website returned status {response.status_code}")
                    except Exception as e:
                        print(f"⚠️ Website check failed: {e}")
                    
                    # Run scanning
                    system.automated_scanning(max_scans=1)
                    scanning_success = True
                    print("✅ Scanning completed")
                else:
                    print("⚠️ automated_scanning method not found")
                    
            except Exception as e:
                print(f"❌ Scanning failed: {e}")
                logger.warning(f"Scanning failed: {e}")
            
            # TASK 2: Resolve pending bets (MOST IMPORTANT)
            print("\\n2. RESOLVE PENDING BETS")
            print("-" * 40)
            
            resolution_success = False
            try:
                if hasattr(system, '_resolve_pending'):
                    print("Running _resolve_pending()...")
                    system._resolve_pending()
                    resolution_success = True
                    print("✅ Bet resolution completed")
                else:
                    print("⚠️ _resolve_pending method not found")
                    
            except Exception as e:
                print(f"❌ Bet resolution failed: {e}")
                traceback.print_exc()
                
                # Try alternative resolution
                print("\\nTrying alternative resolution...")
                try:
                    pending_bets = system.db.get_pending_bets()
                    print(f"Found {len(pending_bets)} pending bets")
                    
                    if pending_bets:
                        resolved = 0
                        for bet in pending_bets[:5]:  # Try first 5
                            try:
                                if hasattr(system, 'resolve_bet_intelligently'):
                                    result = system.resolve_bet_intelligently(bet['id'])
                                    if result.get('resolved'):
                                        resolved += 1
                            except:
                                pass
                        
                        if resolved > 0:
                            resolution_success = True
                            print(f"✅ Resolved {resolved} bets")
                except Exception as alt_e:
                    print(f"Alternative resolution also failed: {alt_e}")
            
            # TASK 3: Performance summary
            print("\\n3. PERFORMANCE SUMMARY")
            print("-" * 40)
            
            try:
                stats = system.db.get_performance_stats()
                pending = len(system.db.get_pending_bets())
                
                print(f"Bankroll: €{system.bankroll:.2f}")
                print(f"Total Profit: €{stats.get('total_profit', 0):.2f}")
                print(f"Total Bets: {stats.get('total_bets', 0)}")
                print(f"Won: {stats.get('won_bets', 0)} | Lost: {stats.get('lost_bets', 0)}")
                print(f"Pending: {pending}")
                
                if stats.get('total_bets', 0) > 0:
                    win_rate = (stats.get('won_bets', 0) / stats.get('total_bets', 0)) * 100
                    print(f"Win Rate: {win_rate:.1f}%")
                    
                print(f"\\nTask Summary:")
                print(f"  Scanning: {'✅' if scanning_success else '❌'}")
                print(f"  Bet Resolution: {'✅' if resolution_success else '❌'}")
                
            except Exception as e:
                print(f"⚠️ Performance summary failed: {e}")
            
            return scanning_success, resolution_success
        
        def main():
            """Main execution function"""
            try:
                # Run system
                system = run_system()
                if not system:
                    return False
                
                # Run tasks
                scanning_success, resolution_success = run_automated_tasks(system)
                
                # Overall success - bet resolution is most important
                overall_success = resolution_success
                
                print("\\n" + "=" * 60)
                print(f"COMPLETED: {datetime.now()}")
                
                if overall_success:
                    print("✅ SUCCESS: Bet resolution completed (main goal)")
                elif scanning_success:
                    print("⚠️ PARTIAL: Scanning worked but bet resolution failed")
                else:
                    print("❌ FAILED: Both scanning and bet resolution failed")
                
                print("=" * 60)
                
                return overall_success
                
            except Exception as e:
                print(f"❌ CRITICAL ERROR: {e}")
                traceback.print_exc()
                return False
        
        # Run and exit
        if __name__ == "__main__":
            success = main()
            sys.exit(0 if success else 1)
        EOF
        
        # Run the CI-optimized script
        echo "\\n=== EXECUTING CI-OPTIMIZED RUNNER ==="
        python run_ci_optimized.py
        
        EXIT_CODE=$?
        
        if [ $EXIT_CODE -eq 0 ]; then
            echo "\\n✅ GitHub Actions workflow completed SUCCESSFULLY!"
        else
            echo "\\n⚠️ GitHub Actions workflow completed with ERRORS"
            echo "Check logs above for details."
            
            # Try a simple fallback - just bet resolution
            echo "\\n=== TRYING SIMPLE FALLBACK ==="
            python3 -c "
            import os
            import sys
            sys.path.insert(0, os.getcwd())
            os.environ['DISPLAY'] = ':99'
            
            print('Running simple bet resolution only...')
            
            try:
                from enhanced_paper_trading import EnhancedPaperTradingSystem
                system = EnhancedPaperTradingSystem()
                print(f'System initialized. Bankroll: €{system.bankroll:.2f}')
                
                # Just try to resolve bets
                if hasattr(system, '_resolve_pending'):
                    print('Resolving pending bets...')
                    system._resolve_pending()
                    print('✅ Simple bet resolution completed')
                else:
                    print('⚠️ _resolve_pending not found')
                    
            except Exception as e:
                print(f'❌ Simple fallback failed: {e}')
                import traceback
                traceback.print_exc()
            "
        fi
        
        echo "\\n🏁 GitHub Actions workflow execution finished!"
