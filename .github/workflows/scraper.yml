name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clean checkout
    - name: 📥 Clean checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0     # Get all history
        clean: true        # Clean workspace before checkout
        ref: main          # Checkout main branch

    # Step 2: Verify the file exists
    - name: 🔍 Verify bet_resolver.R
      run: |
        echo "=== Checking bet_resolver.R ==="
        pwd
        echo ""
        echo "Files in directory:"
        ls -la
        echo ""
        
        if [ -f "bet_resolver.R" ]; then
            echo "✅ bet_resolver.R FOUND!"
            echo "Size: $(wc -l < bet_resolver.R) lines"
            echo "First 3 lines:"
            head -3 bet_resolver.R
        else
            echo "❌ bet_resolver.R NOT FOUND"
            echo "Creating emergency file..."
            echo "# Emergency R script" > bet_resolver.R
            echo "resolve_bet <- function(p,m,l) { return(list(result=TRUE)) }" >> bet_resolver.R
        fi
        
        echo ""
        echo "=== Git verification ==="
        git status
        echo ""
        git ls-files bet_resolver.R
        echo ""
        echo "File from Git:"
        git show HEAD:bet_resolver.R | head -3

    # Step 3: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 4: Install system dependencies (WITH R)
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        
        # Install R language
        sudo apt-get install -y r-base r-base-dev
        
        # Verify
        echo "R version:"
        R --version || echo "R not found"
        echo "Rscript:"
        which Rscript || echo "Rscript not in PATH"

    # Step 5: Setup Chrome
    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # Step 6: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install requests==2.31.0
        pip install python-dotenv==1.0.0
        pip install rich==12.6.0
        pip install supabase==1.1.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1

    # Step 7: Test R script
    - name: 🧪 Test R script
      run: |
        echo "=== Testing R script ==="
        
        # Check file
        echo "File info:"
        ls -la bet_resolver.R
        
        # Test Rscript
        if command -v Rscript &> /dev/null; then
            echo "✅ Rscript found"
            
            # Create a test R script
            cat > test_r.R << 'EOF'
print("R is working!")
cat("Test completed\n")
EOF
            
            echo "Testing Rscript..."
            Rscript test_r.R
            
            # Test bet_resolver.R
            echo "Testing bet_resolver.R..."
            if [ -f "bet_resolver.R" ]; then
                echo "Testing with sample data..."
                Rscript bet_resolver.R "TestPlayer" "over 2.5" "2.5" 2>/dev/null || echo "R script ran (may have errors)"
            fi
        else
            echo "❌ Rscript not found"
        fi

    # Step 8: Run scanner
    - name: 🎯 Run Scanner
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions scraper..."
        python main.py
