name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Get the code from GitHub
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python 3.10
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        
    # Step 4: Install R (SIMPLE VERSION)
    - name: 📊 Install R
      run: |
        sudo apt-get update
        sudo apt-get install -y r-base
        echo "R version:"
        R --version || true
        echo "Rscript:"
        which Rscript || echo "Rscript not found"
        
    # Step 5: Install Chrome for Selenium
    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1
    
    # Step 6: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install requests==2.31.0
        pip install python-dotenv==1.0.0
        pip install rich==12.6.0
        pip install supabase==1.1.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1

    # Step 7: Test R installation
    - name: 🧪 Test R installation
      run: |
        python -c "
        import subprocess
        import shutil
        import sys
        
        # Check if Rscript exists
        rscript_path = shutil.which('Rscript')
        
        if not rscript_path:
            # Try to install R if not found
            print('Rscript not found, attempting simple install...')
            import os
            os.system('sudo apt-get update && sudo apt-get install -y r-base')
            
            # Check again
            rscript_path = shutil.which('Rscript')
        
        if rscript_path:
            print(f'✅ Rscript found at: {rscript_path}')
            
            # Create a simple R script to test
            with open('test_r.R', 'w') as f:
                f.write('print(\"Hello from R!\")')
            
            # Test Rscript
            try:
                result = subprocess.run(['Rscript', 'test_r.R'], 
                                      capture_output=True, text=True, timeout=10)
                print(f'✅ Rscript test output: {result.stdout.strip()}')
            except Exception as e:
                print(f'⚠️ Rscript test failed: {e}')
        else:
            print('❌ Rscript not found - your code may fail')
            print('Consider:')
            print('1. Making R optional in your code')
            print('2. Using Docker with R pre-installed')
            print('3. Using a different GitHub runner with R')
        "
        
    # Step 8: Run your scraper
    - name: 🎯 Run Scanner
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions scraper..."
        python main.py
