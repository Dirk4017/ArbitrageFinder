name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Get the code from GitHub
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python 3.10
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install Chrome for Selenium
    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # Step 4: Install dependencies    
    - name: 📦 Install from requirements.txt
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        pip install -r requirements.txt
    # Step 5: Run your scraper
    - name: 🎯 Run Scanner
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions scraper..."
        python main.py  # or whatever your script is called
