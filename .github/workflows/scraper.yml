name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        
        # Install R
        sudo apt-get install -y r-base r-base-dev
        
        # Install R package dependencies
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
        
        # Verify
        echo "R version:"
        R --version || echo "R check failed"
        echo "Rscript:"
        which Rscript || echo "Rscript not found"

    # Step 3.5: Install R packages
    - name: 📦 Install R packages
      run: |
        echo "=== Installing R packages for bet resolution ==="
        
        # Create user library directory
        mkdir -p ~/R/library
        
        # Set environment variable
        echo "R_LIBS_USER=~/R/library" >> ~/.Renviron
        
        # Install packages one by one with error handling
        echo "Installing jsonlite..."
        Rscript -e "install.packages('jsonlite', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "jsonlite installation had issues"
        
        echo "Installing httr..."
        Rscript -e "install.packages('httr', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "httr installation had issues"
        
        echo "Installing dplyr..."
        Rscript -e "install.packages('dplyr', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "dplyr installation had issues"
        
        echo "Installing lubridate..."
        Rscript -e "install.packages('lubridate', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "lubridate installation had issues"
        
        echo "Installing stringr..."
        Rscript -e "install.packages('stringr', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "stringr installation had issues"
        
        echo "Installing nflreadr..."
        Rscript -e "install.packages('nflreadr', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "nflreadr installation had issues"
        
        echo "Installing hoopR..."
        Rscript -e "install.packages('hoopR', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "hoopR installation had issues"
        
        # Verify installation
        echo "=== Verifying package installation ==="
        Rscript -e "
          # Add user library to path
          .libPaths(c('~/R/library', .libPaths()))
          cat('Library paths:\\n')
          print(.libPaths())
          
          # Test each package
          packages <- c('jsonlite', 'httr', 'dplyr', 'lubridate', 'stringr', 'nflreadr', 'hoopR')
          cat('\\nTesting package loading:\\n')
          for (pkg in packages) {
            success <- require(pkg, character.only = TRUE, quietly = TRUE)
            if (success) {
              cat(paste0('✓ ', pkg, ' loaded successfully\\n'))
            } else {
              cat(paste0('✗ ', pkg, ' FAILED to load\\n'))
            }
          }
        "

    # Step 4: Setup Chrome using official action
    - name: 🌐 Setup Chrome and ChromeDriver
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: 'stable'

    # Step 5: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install rich==12.6.0
        pip install webdriver-manager==4.0.1

    # Step 6: Test R script execution
    - name: 🧪 Test R script execution
      run: |
        echo "=== Testing R script execution ==="
        
        # Create a simple test script
        cat > test_r_script.R << 'EOF'
        # Set library path
        .libPaths(c('~/R/library', .libPaths()))
        
        # Try to load packages
        cat("Loading R packages...\\n")
        packages <- c('jsonlite', 'httr', 'dplyr', 'lubridate', 'stringr', 'nflreadr', 'hoopR')
        
        for (pkg in packages) {
          if (require(pkg, character.only = TRUE)) {
            cat(paste0("✓ ", pkg, "\\n"))
          } else {
            cat(paste0("✗ ", pkg, "\\n"))
          }
        }
        
        # Test a simple function
        cat("\\nTesting simple R function...\\n")
        result <- list(
          success = TRUE,
          test = "R script works",
          packages = packages
        )
        
        # Output JSON for Python to parse
        cat("\\nJSON_OUTPUT_START\\n")
        cat(jsonlite::toJSON(result, auto_unbox = TRUE))
        cat("\\nJSON_OUTPUT_END\\n")
        EOF
        
        echo "Running test R script..."
        Rscript test_r_script.R || echo "R script execution failed"

    # Step 7: Test Selenium setup
    - name: 🧪 Test Selenium setup
      run: |
        echo "=== Testing Selenium setup ==="
        
        # Create a test script
        cat > test_selenium.py << 'EOF'
        from selenium import webdriver
        from selenium.webdriver.chrome.options import Options
        from selenium.webdriver.chrome.service import Service
        from selenium.webdriver.common.by import By
        import os
        
        print("Testing Selenium with Chrome...")
        
        # Configure Chrome options
        chrome_options = Options()
        chrome_options.add_argument('--no-sandbox')
        chrome_options.add_argument('--disable-dev-shm-usage')
        chrome_options.add_argument('--headless')
        chrome_options.add_argument('--disable-gpu')
        chrome_options.add_argument('--window-size=1920,1080')
        
        # Use webdriver-manager for automatic ChromeDriver management
        try:
            from webdriver_manager.chrome import ChromeDriverManager
            from selenium.webdriver.chrome.service import Service as ChromeService
            
            print("Using webdriver-manager for ChromeDriver...")
            service = ChromeService(ChromeDriverManager().install())
            driver = webdriver.Chrome(service=service, options=chrome_options)
        except:
            print("Falling back to default ChromeDriver...")
            # Fallback to default
            driver = webdriver.Chrome(options=chrome_options)
        
        try:
            print("Loading Google.com...")
            driver.get('https://www.google.com')
            print(f"✅ Success! Page title: {driver.title}")
            
            print("Testing page source...")
            if 'google' in driver.page_source.lower():
                print("✅ Google page loaded correctly")
            else:
                print("⚠️ Page loaded but content unexpected")
            
            # Test that we can find elements
            search_box = driver.find_element(By.NAME, 'q')
            print("✅ Can find page elements")
            
            driver.quit()
            print("✅ Selenium test passed!")
            
        except Exception as e:
            print(f"❌ Selenium error: {e}")
            import traceback
            traceback.print_exc()
            try:
                driver.quit()
            except:
                pass
        EOF
        
        python test_selenium.py

    # Step 8: Run the main script (FIXED VERSION)
    - name: 🎯 Run Automated Scanner
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions - Sports Bet Scanner"
        echo "=================================================="
        echo "Current time: $(date)"
        
        # First check project structure
        echo "=== Project Structure ==="
        echo "Files in repository:"
        ls -la
        echo ""
        echo "Python files:"
        find . -name "*.py" -type f | head -20
        
        # Create the fixed runner script
        cat > run_scanner.py << 'EOF'
        import os
        import sys
        import traceback
        from datetime import datetime
        
        print("=" * 60)
        print("SPORTS BET SCANNER - GITHUB ACTIONS")
        print(f"Started at: {datetime.now()}")
        print("=" * 60)
        
        # Setup Python path
        current_dir = os.getcwd()
        sys.path.insert(0, current_dir)
        print(f"Current directory: {current_dir}")
        print(f"Python path: {sys.path}")
        
        def import_scraper():
            """Try multiple ways to import the scraper module"""
            print("\\n=== IMPORTING SCRAPER MODULE ===")
            
            # Method 1: Direct import
            try:
                import scraper
                print("✅ Method 1: Direct import successful")
                return scraper
            except ImportError as e:
                print(f"❌ Method 1 failed: {e}")
            
            # Method 2: Import as module from file
            try:
                import importlib.util
                spec = importlib.util.spec_from_file_location("scraper", "scraper.py")
                scraper = importlib.util.module_from_spec(spec)
                spec.loader.exec_module(scraper)
                print("✅ Method 2: File import successful")
                return scraper
            except Exception as e:
                print(f"❌ Method 2 failed: {e}")
            
            # Method 3: Execute the file
            try:
                with open('scraper.py', 'r') as f:
                    code = f.read()
                
                # Create a module dictionary
                module_dict = {'__name__': 'scraper'}
                exec(code, module_dict)
                
                # Create a simple module-like object
                class SimpleModule:
                    pass
                module = SimpleModule()
                for key, value in module_dict.items():
                    if not key.startswith('__'):
                        setattr(module, key, value)
                
                print("✅ Method 3: Code execution successful")
                return module
            except Exception as e:
                print(f"❌ Method 3 failed: {e}")
            
            return None
        
        def find_scraper_class(scraper_module):
            """Find the main scraper class in the module"""
            print("\\n=== FINDING SCRAPER CLASS ===")
            
            # List all attributes in the module
            attrs = [attr for attr in dir(scraper_module) if not attr.startswith('_')]
            print(f"Available attributes: {attrs[:10]}...")
            
            # Look for likely class names
            class_candidates = [
                'EnhancedPaperTradingSystem',
                'PaperTradingSystem', 
                'SportsBetScanner',
                'BetScanner',
                'TradingSystem'
            ]
            
            for candidate in class_candidates:
                if hasattr(scraper_module, candidate):
                    print(f"✅ Found class: {candidate}")
                    return getattr(scraper_module, candidate)
            
            # If not found by name, look for any class
            for attr_name in attrs:
                attr = getattr(scraper_module, attr_name)
                if isinstance(attr, type):
                    print(f"Found class '{attr_name}' - using it")
                    return attr
            
            raise AttributeError("No scraper class found in module")
        
        def run_scan(system):
            """Run the opportunity scan"""
            print("\\n=== SCANNING FOR OPPORTUNITIES ===")
            
            method_name = 'option_1_scan_for_opportunities'
            if hasattr(system, method_name):
                try:
                    print(f"Running {method_name}...")
                    opportunities = getattr(system, method_name)()
                    
                    if opportunities and len(opportunities) > 0:
                        print(f"✅ Found {len(opportunities)} opportunities!")
                        for i, opp in enumerate(opportunities[:3]):
                            sport = opp.get('sport', 'Unknown')
                            team = opp.get('team', 'Unknown')
                            ev = opp.get('ev_percentage', opp.get('ev', 0))
                            print(f"  {i+1}. {sport}: {team} (EV: {ev}%)")
                        return True
                    else:
                        print("⚠️ No opportunities found")
                        return False
                except Exception as e:
                    print(f"❌ Scan failed: {e}")
                    traceback.print_exc()
                    return False
            else:
                print(f"⚠️ Method '{method_name}' not found")
                return False
        
        def run_bet_resolution(system):
            """Run bet resolution"""
            print("\\n=== RESOLVING PENDING BETS ===")
            
            # Try different possible method names
            method_names = [
                'option_5_resolve_pending_bets',
                'resolve_pending_bets',
                'update_pending_bets',
                'check_bet_results'
            ]
            
            for method_name in method_names:
                if hasattr(system, method_name):
                    try:
                        print(f"Running {method_name}...")
                        result = getattr(system, method_name)()
                        print(f"✅ Bet resolution completed")
                        return True
                    except Exception as e:
                        print(f"❌ {method_name} failed: {e}")
                        traceback.print_exc()
            
            print("⚠️ No bet resolution method found")
            return False
        
        def run_cleanup(system):
            """Cleanup resources"""
            print("\\n=== CLEANUP ===")
            if hasattr(system, 'cleanup'):
                try:
                    system.cleanup()
                    print("✅ Cleanup completed")
                except Exception as e:
                    print(f"⚠️ Cleanup failed: {e}")
            else:
                print("⚠️ No cleanup method found")
        
        def main():
            """Main execution function"""
            try:
                # Step 1: Import scraper
                scraper_module = import_scraper()
                if not scraper_module:
                    print("❌ Failed to import scraper module")
                    return False
                
                # Step 2: Find class
                try:
                    ScraperClass = find_scraper_class(scraper_module)
                except AttributeError as e:
                    print(f"❌ {e}")
                    return False
                
                # Step 3: Create instance
                print("\\n=== INITIALIZING SYSTEM ===")
                try:
                    system = ScraperClass()
                    print("✅ System initialized")
                except Exception as e:
                    print(f"❌ Failed to initialize system: {e}")
                    traceback.print_exc()
                    return False
                
                # Step 4: Run scan (optional)
                try:
                    run_scan(system)
                except:
                    print("Scan failed, continuing...")
                
                # Step 5: Run bet resolution (critical)
                success = run_bet_resolution(system)
                
                # Step 6: Cleanup
                run_cleanup(system)
                
                return success
                
            except Exception as e:
                print(f"❌ UNEXPECTED ERROR: {e}")
                traceback.print_exc()
                return False
        
        # Run the main function
        if __name__ == "__main__":
            success = main()
            print("\\n" + "=" * 60)
            print(f"COMPLETED AT: {datetime.now()}")
            print(f"RESULT: {'SUCCESS' if success else 'FAILED (but tried)'}")
            print("=" * 60)
            
            # Exit with appropriate code
            sys.exit(0 if success else 1)
        EOF
        
        # Run the scanner
        echo "\\n=== EXECUTING MAIN SCRIPT ==="
        python run_scanner.py
        
        # Check result
        if [ $? -eq 0 ]; then
            echo "✅ Workflow completed successfully!"
        else
            echo "⚠️ Workflow completed with errors (but tried to run)"
        fi
