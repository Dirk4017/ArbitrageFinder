name: Sports Betting Scraper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 7,19 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1

    - name: 📦 Install from requirements.txt
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        pip install -r requirements.txt

    - name: 🧪 Test Connection
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python -c "
        import os
        from supabase import create_client
        
        url = os.getenv('SUPABASE_URL')
        key = os.getenv('SUPABASE_KEY')
        
        print(f'Testing Supabase v1.x...')
        print(f'URL: {bool(url)}')
        print(f'Key: {bool(key)}')
        
        if url and key:
            try:
                # OLD API - no proxy parameter
                client = create_client(url, key)
                print('✅ Client created successfully')
                
                # Test query
                result = client.table('bets').select('*').limit(1).execute()
                print(f'✅ Found {len(result.data)} rows')
            except Exception as e:
                print(f'❌ Error: {e}')
                import traceback
                traceback.print_exc()
        else:
            print('❌ Missing credentials')
        "

    - name: 🚀 Run Your Actual Scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        # Run your actual script
        python main.py  # or whatever your script is called
