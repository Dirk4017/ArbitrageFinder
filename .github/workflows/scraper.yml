name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        
        # Install R
        sudo apt-get install -y r-base r-base-dev
        
        # Verify
        echo "R version:"
        R --version || echo "R check failed"
        echo "Rscript:"
        which Rscript || echo "Rscript not found"

    # Step 4: Setup Chrome
    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # Step 5: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install rich==12.6.0

    # Step 6: Verify setup
    - name: 🔍 Verify setup
      run: |
        echo "=== Verification ==="
        echo "Current directory: $(pwd)"
        echo ""
        echo "File check:"
        ls -la bet_resolver.R 2>/dev/null || echo "bet_resolver.R not found"
        echo ""
        echo "Python test:"
        python -c "
        import os
        print(f'Current dir: {os.getcwd()}')
        print(f'bet_resolver.R exists: {os.path.exists(\"bet_resolver.R\")}')
        if os.path.exists('bet_resolver.R'):
            print(f'File size: {os.path.getsize(\"bet_resolver.R\")} bytes')
        "

    # Step 7: Run scanner
    - name: 🎯 Run Scanner
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions scraper..."
        python main.py
