name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🌐 Install Chrome & System Dependencies
      run: |
        echo "=== Installing Chrome and system dependencies ==="
        sudo apt-get update
        sudo apt-get install -y wget xvfb libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev \
          libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libicu-dev \
          libgmp3-dev libmpfr-dev libudunits2-dev libgdal-dev libgeos-dev libproj-dev libcairo2-dev libxt-dev
        wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt-get install -y /tmp/chrome.deb || true
        sudo apt-get install -f -y
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        echo "DISPLAY=:99" >> $GITHUB_ENV
        echo "✅ Done"

    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0 python-dotenv==1.0.0 requests==2.31.0 supabase==1.1.1 fuzzywuzzy==0.18.0 \
          python-Levenshtein==0.25.1 pandas==1.5.0 numpy==1.24.0 beautifulsoup4==4.11.0 lxml==4.9.0 rich==12.6.0 \
          webdriver-manager==4.0.1

    - name: 📦 Install R with packages
      run: |
        echo "=== Installing R ==="
        sudo apt-get install -y r-base r-base-dev

        echo 'user_lib <- Sys.getenv("R_LIBS_USER"); if (user_lib == "") user_lib <- paste0(Sys.getenv("HOME"), "/R/x86_64-pc-linux-gnu-library/4.3"); dir.create(user_lib, showWarnings = FALSE, recursive = TRUE); options(repos = c(CRAN = "https://cloud.r-project.org")); cat("Installing packages...\n"); for(pkg in c("jsonlite", "httr", "stringr", "dplyr", "lubridate")) { cat("  ", pkg, "... "); tryCatch({ install.packages(pkg, lib = user_lib, dependencies = TRUE, quiet = TRUE); cat("OK\n") }, error = function(e) cat("FAILED\n")) }; cat("Trying nflreadr... "); tryCatch({ install.packages("nflreadr", lib = user_lib, dependencies = TRUE, quiet = TRUE); cat("OK\n") }, error = function(e) { cat("CRAN failed, trying GitHub... "); tryCatch({ install.packages("remotes", quiet = TRUE); remotes::install_github("nflverse/nflreadr", upgrade = "never", quiet = TRUE); cat("OK\n") }, error = function(e2) cat("FAILED\n")) }); cat("Trying hoopR... "); tryCatch({ install.packages("hoopR", lib = user_lib, dependencies = TRUE, quiet = TRUE); cat("OK\n") }, error = function(e) cat("FAILED\n")); cat("\nVerifying:\n"); for(pkg in c("jsonlite", "httr", "stringr", "dplyr", "lubridate", "nflreadr", "hoopR")) { if (requireNamespace(pkg, quietly = TRUE)) cat("  ✅", pkg, "\n") else cat("  ❌", pkg, "\n") }' > /tmp/install_r.R

        Rscript /tmp/install_r.R
        echo "R_LIBS_USER=~/R/x86_64-pc-linux-gnu-library/4.3" >> $GITHUB_ENV
        echo "✅ R installation completed"

    - name: 🔧 Patch bet_resolver.R
      run: |
        echo "=== Patching bet_resolver.R ==="
        if [ -f "bet_resolver.R" ]; then
          cp bet_resolver.R bet_resolver.R.backup

          echo 'options(warn=-1); safe_load <- function(pkg) { tryCatch({ library(pkg, character.only=TRUE, quietly=TRUE); TRUE }, error=function(e) FALSE) }; for(pkg in c("jsonlite","httr","stringr","dplyr","lubridate")) { if(!safe_load(pkg)) { cat("CRITICAL:", pkg, "failed\n", file=stderr()); quit(status=1) } }; nflreadr_ok <- safe_load("nflreadr"); hoopR_ok <- safe_load("hoopR"); if(!nflreadr_ok) { nflreadr <<- list(load_pbp=function(s) data.frame(), load_schedules=function(s) data.frame(), load_player_stats=function(s) data.frame(), available_seasons=function() c(2023,2024), clean_team_abbrs=function(x) x) }; if(!hoopR_ok) { hoopR <<- list(load_nba_pbp=function(s) data.frame(), load_nba_schedule=function(s) data.frame()) }; cat("Packages loaded (nflreadr:", nflreadr_ok, ", hoopR:", hoopR_ok, ")\n", file=stderr())' > /tmp/header.R

          sed 's/^library(nflreadr)/#library(nflreadr)/; s/^library(hoopR)/#library(hoopR)/; s/^library(jsonlite)/#library(jsonlite)/; s/^library(httr)/#library(httr)/; s/^library(stringr)/#library(stringr)/; s/^library(dplyr)/#library(dplyr)/; s/^library(lubridate)/#library(lubridate)/' bet_resolver.R.backup > /tmp/body.R

          cat /tmp/header.R /tmp/body.R > bet_resolver.R
          echo "✅ bet_resolver.R patched"
        else
          echo "⚠️ bet_resolver.R not found"
        fi

    - name: 🔧 Fix Python code
      run: |
        for dir in scanners scraper resolvers arbitrage database; do
          mkdir -p "$dir"
          [ ! -f "$dir/__init__.py" ] && echo "# Package" > "$dir/__init__.py"
        done
        echo "✅ Done"

    - name: 🎯 Run System
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        DISPLAY: ':99'
        R_LIBS_USER: ~/R/x86_64-pc-linux-gnu-library/4.3
      run: |
        echo "🚀 Running Enhanced Paper Trading System"

        Rscript -e 'cat("R Test: "); for(p in c("jsonlite","httr","dplyr")) if(require(p,quietly=TRUE,character.only=TRUE)) cat(p,"") else cat("!",p); cat("\n")'

        python3 << 'PYEOF'
        import os, sys, traceback
        print("=" * 60)
        print("ENHANCED PAPER TRADING - PRODUCTION RUN")
        print("=" * 60)
        sys.path.insert(0, os.getcwd())
        try:
            from enhanced_paper_trading import EnhancedPaperTradingSystem
            print("✅ System imported")
            system = EnhancedPaperTradingSystem()
            print(f"💰 Bankroll: €{system.bankroll:.2f}")
            pending = system.db.get_pending_bets()
            print(f"📊 Pending bets: {len(pending)}")
            if pending:
                print("\n📋 Sample:")
                for i, bet in enumerate(pending[:3]):
                    print(f"  {i+1}. {bet.get('player','?')} ({bet.get('sport','?')})")
                print("\n🔄 Resolving...")
                try:
                    resolved = system._resolve_pending()
                    print(f"✅ Resolved {resolved}")
                except Exception as e:
                    print(f"⚠️ Resolution error: {str(e)[:80]}")
            print("\n📡 Scanning...")
            try:
                system.automated_scanning(max_scans=1)
                print("✅ Done")
            except Exception as e:
                print(f"⚠️ Scanner error: {e}")
            print(f"\n💰 Final: €{system.bankroll:.2f}")
            print("✅ COMPLETED")
        except Exception as e:
            print(f"❌ Error: {e}")
            traceback.print_exc()
        PYEOF

        echo "✅ Workflow completed"
