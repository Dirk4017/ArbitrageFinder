name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        
        # Install R
        sudo apt-get install -y r-base r-base-dev
        
        # Install R package dependencies
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
        
        # Verify
        echo "R version:"
        R --version || echo "R check failed"
        echo "Rscript:"
        which Rscript || echo "Rscript not found"

    # Step 3.5: Install R packages
    - name: 📦 Install R packages
      run: |
        echo "=== Installing R packages for bet resolution ==="
        
        # Create user library directory
        mkdir -p ~/R/library
        
        # Set environment variable
        echo "R_LIBS_USER=~/R/library" >> ~/.Renviron
        
        # Install packages one by one with error handling
        echo "Installing jsonlite..."
        Rscript -e "install.packages('jsonlite', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "jsonlite installation had issues"
        
        echo "Installing httr..."
        Rscript -e "install.packages('httr', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "httr installation had issues"
        
        echo "Installing dplyr..."
        Rscript -e "install.packages('dplyr', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "dplyr installation had issues"
        
        echo "Installing lubridate..."
        Rscript -e "install.packages('lubridate', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "lubridate installation had issues"
        
        echo "Installing stringr..."
        Rscript -e "install.packages('stringr', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "stringr installation had issues"
        
        echo "Installing nflreadr..."
        Rscript -e "install.packages('nflreadr', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "nflreadr installation had issues"
        
        echo "Installing hoopR..."
        Rscript -e "install.packages('hoopR', lib='~/R/library', repos='https://cloud.r-project.org')" || echo "hoopR installation had issues"
        
        # Verify installation
        echo "=== Verifying package installation ==="
        Rscript -e "
          # Add user library to path
          .libPaths(c('~/R/library', .libPaths()))
          cat('Library paths:\\n')
          print(.libPaths())
          
          # Test each package
          packages <- c('jsonlite', 'httr', 'dplyr', 'lubridate', 'stringr', 'nflreadr', 'hoopR')
          cat('\\nTesting package loading:\\n')
          for (pkg in packages) {
            success <- require(pkg, character.only = TRUE, quietly = TRUE)
            if (success) {
              cat(paste0('✓ ', pkg, ' loaded successfully\\n'))
            } else {
              cat(paste0('✗ ', pkg, ' FAILED to load\\n'))
            }
          }
        "

    # Step 4: Setup Chrome using official action
    - name: 🌐 Setup Chrome and ChromeDriver
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: 'stable'

    # Step 5: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install rich==12.6.0
        pip install webdriver-manager==4.0.1

    # Step 6: Test R script execution
    - name: 🧪 Test R script execution
      run: |
        echo "=== Testing R script execution ==="
        
        # Create a simple test script
        cat > test_r_script.R << 'EOF'
        # Set library path
        .libPaths(c('~/R/library', .libPaths()))
        
        # Try to load packages
        cat("Loading R packages...\\n")
        packages <- c('jsonlite', 'httr', 'dplyr', 'lubridate', 'stringr', 'nflreadr', 'hoopR')
        
        for (pkg in packages) {
          if (require(pkg, character.only = TRUE)) {
            cat(paste0("✓ ", pkg, "\\n"))
          } else {
            cat(paste0("✗ ", pkg, "\\n"))
          }
        }
        
        # Test a simple function
        cat("\\nTesting simple R function...\\n")
        result <- list(
          success = TRUE,
          test = "R script works",
          packages = packages
        )
        
        # Output JSON for Python to parse
        cat("\\nJSON_OUTPUT_START\\n")
        cat(jsonlite::toJSON(result, auto_unbox = TRUE))
        cat("\\nJSON_OUTPUT_END\\n")
        EOF
        
        echo "Running test R script..."
        Rscript test_r_script.R || echo "R script execution failed"

    # Step 7: Test Selenium setup
    - name: 🧪 Test Selenium setup
      run: |
        echo "=== Testing Selenium setup ==="
        
        # Create a test script
        cat > test_selenium.py << 'EOF'
        from selenium import webdriver
        from selenium.webdriver.chrome.options import Options
        from selenium.webdriver.chrome.service import Service
        from selenium.webdriver.common.by import By
        import os
        
        print("Testing Selenium with Chrome...")
        
        # Configure Chrome options
        chrome_options = Options()
        chrome_options.add_argument('--no-sandbox')
        chrome_options.add_argument('--disable-dev-shm-usage')
        chrome_options.add_argument('--headless')
        chrome_options.add_argument('--disable-gpu')
        chrome_options.add_argument('--window-size=1920,1080')
        
        # Use webdriver-manager for automatic ChromeDriver management
        try:
            from webdriver_manager.chrome import ChromeDriverManager
            from selenium.webdriver.chrome.service import Service as ChromeService
            
            print("Using webdriver-manager for ChromeDriver...")
            service = ChromeService(ChromeDriverManager().install())
            driver = webdriver.Chrome(service=service, options=chrome_options)
        except:
            print("Falling back to default ChromeDriver...")
            # Fallback to default
            driver = webdriver.Chrome(options=chrome_options)
        
        try:
            print("Loading Google.com...")
            driver.get('https://www.google.com')
            print(f"✅ Success! Page title: {driver.title}")
            
            print("Testing page source...")
            if 'google' in driver.page_source.lower():
                print("✅ Google page loaded correctly")
            else:
                print("⚠️ Page loaded but content unexpected")
            
            # Test that we can find elements
            search_box = driver.find_element(By.NAME, 'q')
            print("✅ Can find page elements")
            
            driver.quit()
            print("✅ Selenium test passed!")
            
        except Exception as e:
            print(f"❌ Selenium error: {e}")
            import traceback
            traceback.print_exc()
            try:
                driver.quit()
            except:
                pass
        EOF
        
        python test_selenium.py

    # Step 8: Run the Automated Scanner (FINAL CORRECTED VERSION)
    - name: 🎯 Run Enhanced Paper Trading System
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Running Enhanced Paper Trading System"
        echo "=========================================="
        echo "Current time: $(date)"
        
        # Create the correct runner script based on your actual class methods
        cat > automated_runner.py << 'EOF'
        import os
        import sys
        import logging
        import traceback
        from datetime import datetime
        
        # Setup logging for GitHub Actions
        logging.basicConfig(
            level=logging.INFO,
            format='%(asctime)s - %(name)s - %(levelname)s - %(message)s',
            handlers=[logging.StreamHandler()]
        )
        logger = logging.getLogger(__name__)
        
        print("=" * 60)
        print("ENHANCED PAPER TRADING SYSTEM - AUTOMATED RUN")
        print(f"Started at: {datetime.now()}")
        print("=" * 60)
        
        def main():
            try:
                # Add current directory to Python path
                sys.path.insert(0, os.getcwd())
                
                # Import the system
                from enhanced_paper_trading import EnhancedPaperTradingSystem
                
                print("✅ Imported EnhancedPaperTradingSystem")
                
                # Initialize system
                print("Initializing system...")
                system = EnhancedPaperTradingSystem()
                print("✅ System initialized")
                print(f"Bankroll: €{system.bankroll:.2f}")
                
                # TASK 1: Run automated scanning
                print("\\n" + "=" * 40)
                print("TASK 1: AUTOMATED SCANNING")
                print("=" * 40)
                
                try:
                    # Check if automated_scanning method exists
                    if hasattr(system, 'automated_scanning'):
                        print("Running automated_scanning()...")
                        system.automated_scanning(max_scans=1)
                        print("✅ Automated scanning completed")
                    else:
                        print("⚠️ automated_scanning method not found")
                        
                        # Try scanner.scrape_crazyninja_odds directly
                        if hasattr(system, 'scanner'):
                            print("Trying scanner.scrape_crazyninja_odds()...")
                            opportunities = system.scanner.scrape_crazyninja_odds()
                            if opportunities:
                                print(f"Found {len(opportunities)} opportunities")
                                for opp in opportunities[:3]:
                                    print(f"  - {opp.get('player', 'Unknown')}: {opp.get('market', 'Unknown')}")
                            else:
                                print("No opportunities found")
                except Exception as e:
                    print(f"❌ Automated scanning failed: {e}")
                    logger.error(f"Scanning failed: {e}")
                
                # TASK 2: Resolve pending bets (MOST IMPORTANT)
                print("\\n" + "=" * 40)
                print("TASK 2: RESOLVE PENDING BETS")
                print("=" * 40)
                
                try:
                    # Check if _resolve_pending method exists (private method)
                    if hasattr(system, '_resolve_pending'):
                        print("Running _resolve_pending()...")
                        system._resolve_pending()
                        print("✅ Bet resolution completed")
                    else:
                        print("⚠️ _resolve_pending method not found, trying resolve_bet_intelligently")
                        
                        # Try to get pending bets and resolve them one by one
                        if hasattr(system, 'db'):
                            pending_bets = system.db.get_pending_bets()
                            print(f"Found {len(pending_bets)} pending bets")
                            
                            if pending_bets:
                                resolved_count = 0
                                future_count = 0
                                college_count = 0
                                error_count = 0
                                
                                for bet in pending_bets:
                                    player = bet.get('player', 'Unknown')
                                    market = bet.get('market', 'Unknown')
                                    game_date = bet.get('game_date', 'Unknown')
                                    sport = bet.get('sport', 'Unknown')
                                    
                                    print(f"\\n  Bet: {player} - {market}")
                                    print(f"    Game: {game_date} | Sport: {sport}")
                                    
                                    if hasattr(system, 'resolve_bet_intelligently'):
                                        result = system.resolve_bet_intelligently(bet['id'])
                                        
                                        if not result.get('success'):
                                            error_msg = result.get('error', 'Unknown error')
                                            print(f"    ✗ Error: {error_msg}")
                                            error_count += 1
                                        elif result.get('resolved'):
                                            status = "WON" if result.get('won') else "LOST"
                                            profit = result.get('profit', 0)
                                            print(f"    ✓ {status}: €{profit:.2f}")
                                            resolved_count += 1
                                        elif result.get('skip_reason') == 'future_game':
                                            message = result.get('message', 'Game in future')
                                            print(f"    ⏸ Skipped (future): {message}")
                                            future_count += 1
                                        elif result.get('skip_reason') == 'college_game':
                                            message = result.get('message', 'College game')
                                            print(f"    🎓 Skipped (college): {message}")
                                            college_count += 1
                                        else:
                                            message = result.get('message', 'Not yet resolvable')
                                            print(f"    ○ Not resolved: {message}")
                                            error_count += 1
                                    
                                print(f"\\nBet resolution summary:")
                                print(f"  Resolved: {resolved_count}")
                                print(f"  Future games (skipped): {future_count}")
                                print(f"  College games (skipped): {college_count}")
                                print(f"  Errors/unresolved: {error_count}")
                            else:
                                print("No pending bets to resolve")
                except Exception as e:
                    print(f"❌ Bet resolution failed: {e}")
                    logger.error(f"Bet resolution failed: {e}", exc_info=True)
                
                # TASK 3: Update missing bet categories
                print("\\n" + "=" * 40)
                print("TASK 3: UPDATE MISSING BET CATEGORIES")
                print("=" * 40)
                
                try:
                    if hasattr(system, 'db') and hasattr(system.db, 'update_existing_bet_categories'):
                        print("Updating existing bet categories...")
                        updated = system.db.update_existing_bet_categories()
                        print(f"✅ Updated {updated} bets with missing categories")
                    else:
                        print("⚠️ update_existing_bet_categories method not available")
                except Exception as e:
                    print(f"❌ Category update failed: {e}")
                
                # TASK 4: Show performance summary
                print("\\n" + "=" * 40)
                print("TASK 4: PERFORMANCE SUMMARY")
                print("=" * 40)
                
                try:
                    if hasattr(system, '_view_performance'):
                        system._view_performance()
                    elif hasattr(system, 'db'):
                        stats = system.db.get_performance_stats()
                        
                        print(f"Bankroll: €{system.bankroll:.2f}")
                        print(f"Total Profit/Loss: €{stats.get('total_profit', 0):.2f}")
                        print(f"Total Bets: {stats.get('total_bets', 0)}")
                        print(f"Won: {stats.get('won_bets', 0)} | Lost: {stats.get('lost_bets', 0)}")
                        print(f"Pending: {stats.get('pending_bets', 0)}")
                        
                        if stats.get('total_bets', 0) > 0:
                            win_rate = (stats.get('won_bets', 0) / stats.get('total_bets', 0)) * 100
                            print(f"Win Rate: {win_rate:.1f}%")
                except Exception as e:
                    print(f"❌ Performance summary failed: {e}")
                
                print("\\n" + "=" * 60)
                print(f"COMPLETED AT: {datetime.now()}")
                print("✅ ALL TASKS COMPLETED SUCCESSFULLY")
                print("=" * 60)
                
                return True
                
            except ImportError as e:
                print(f"❌ Import Error: {e}")
                print(f"Current directory: {os.getcwd()}")
                print(f"Files in directory: {os.listdir('.')}")
                traceback.print_exc()
                return False
            except Exception as e:
                print(f"❌ Unexpected Error: {e}")
                traceback.print_exc()
                return False
        
        if __name__ == "__main__":
            success = main()
            sys.exit(0 if success else 1)
        EOF
        
        # Run the automated runner
        echo "\\n=== EXECUTING AUTOMATED RUNNER ==="
        python automated_runner.py
        
        # Check result
        if [ $? -eq 0 ]; then
            echo "✅ Workflow completed successfully!"
        else
            echo "⚠️ Workflow completed with errors"
            
            # Try fallback: Run main.py directly
            echo "\\n=== TRYING FALLBACK: RUN MAIN.PY ==="
            python -c "
            import os
            import sys
            sys.path.insert(0, os.getcwd())
            
            # Mock input for automated execution
            import builtins
            original_input = builtins.input
            
            def mock_input(prompt=''):
                print(f'Mock input called with prompt: {prompt}')
                # Return '5' for resolve pending bets, then '0' to exit
                if 'Select option' in prompt:
                    return '5'
                elif 'Place bet?' in prompt:
                    return 'n'
                else:
                    return ''
            
            builtins.input = mock_input
            
            try:
                import main
                print('✅ main.py imported successfully')
                
                # We can't run main.main() because it's interactive
                # Instead, import EnhancedPaperTradingSystem directly
                from enhanced_paper_trading import EnhancedPaperTradingSystem
                system = EnhancedPaperTradingSystem()
                print('✅ System initialized')
                
                # Try to resolve pending bets
                print('\\n=== RESOLVING PENDING BETS ===')
                if hasattr(system, '_resolve_pending'):
                    system._resolve_pending()
                else:
                    print('⚠️ _resolve_pending method not found')
                
            except Exception as e:
                print(f'❌ Error: {e}')
                import traceback
                traceback.print_exc()
            
            builtins.input = original_input
            "
        fi
        
        echo "\\n✅ GitHub Actions workflow execution completed!"
