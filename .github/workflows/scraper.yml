name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout with LFS
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential r-base git-lfs
        
        # Setup Git LFS
        git lfs install

    # Step 4: Pull LFS files
    - name: 📥 Pull LFS files
      run: |
        echo "Pulling LFS files..."
        git lfs pull || echo "LFS pull may have failed"
        
        echo "Checking bet_resolver.R..."
        if [ -f "bet_resolver.R" ]; then
            echo "✅ bet_resolver.R exists"
            ls -la bet_resolver.R
        else
            echo "❌ bet_resolver.R missing even after LFS"
            # Create emergency version
            echo "# Emergency R script" > bet_resolver.R
            echo "resolve_bet <- function(p,m,l) { return(list(result=TRUE)) }" >> bet_resolver.R
        fi

    # Step 5: Setup Chrome
    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # Step 6: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1

    # Step 7: Run scanner
    - name: 🎯 Run Scanner
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions scraper..."
        echo "File exists:"
        ls -la bet_resolver.R
        python main.py
