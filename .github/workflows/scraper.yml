name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Get the code from GitHub
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python 3.10
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        
    # Step 4: Install R
    - name: 📊 Install R language
      run: |
        # Add R repository
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository 'deb https://cloud.r-project.org/bin/linux/ubuntu jammy-cran40/'
        sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys E298A3A825C0D65DFD57CBB651716619E084DAB9
        
        # Install R
        sudo apt-get update
        sudo apt-get install -y r-base r-base-dev
        
        # Verify
        echo "R version:"
        R --version
        echo "Rscript location:"
        which Rscript

    # Step 5: Install Chrome for Selenium
    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1
    
    # Step 6: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install requests==2.31.0
        pip install python-dotenv==1.0.0
        pip install rich==12.6.0
        pip install supabase==1.1.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1

    # Step 7: Test R installation
    - name: 🧪 Test R
      run: |
        python -c "
        import subprocess
        import shutil
        
        # Check if Rscript exists
        rscript_path = shutil.which('Rscript')
        if rscript_path:
            print(f'✅ Rscript found at: {rscript_path}')
            
            # Test Rscript
            try:
                result = subprocess.run(['Rscript', '--version'], 
                                      capture_output=True, text=True)
                print(f'✅ Rscript works: {result.stdout[:50]}...')
            except Exception as e:
                print(f'❌ Rscript failed: {e}')
        else:
            print('❌ Rscript not found in PATH')
            
        # Check R
        r_path = shutil.which('R')
        if r_path:
            print(f'✅ R found at: {r_path}')
        "
        
    # Step 8: Run your scraper
    - name: 🎯 Run Scanner
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions scraper..."
        python main.py
