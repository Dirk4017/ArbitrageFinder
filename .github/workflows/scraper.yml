name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install Chrome WITHOUT problematic dependencies
    - name: 🌐 Install Chrome directly
      run: |
        echo "=== Installing Chrome ==="
        
        # Install minimal dependencies first
        sudo apt-get update
        sudo apt-get install -y \
          wget \
          xvfb \
          libnss3 \
          libx11-xcb1 \
          libxcomposite1
        
        # Download and install Chrome
        wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        
        # Install Chrome with force dependencies
        sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y
        
        echo "Chrome version:"
        google-chrome --version || echo "Chrome installed"
        
        # Setup Xvfb
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        export DISPLAY=:99
        
        echo "✅ Chrome installed"

    # Step 4: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install rich==12.6.0
        pip install webdriver-manager==4.0.1

    # Step 5: Install R (required for bet resolution)
    - name: 📦 Install R
      run: |
        echo "=== Installing R ==="
        
        # Install R with minimal dependencies
        sudo apt-get install -y r-base-core
        
        echo "Rscript location:"
        which Rscript || echo "Installing Rscript..."
        
        # If Rscript not found, install r-base
        if ! which Rscript > /dev/null 2>&1; then
          sudo apt-get install -y r-base
        fi
        
        # Verify
        Rscript --version || echo "R not working but continuing"
        
        # Try to install jsonlite
        Rscript -e "tryCatch({install.packages('jsonlite', repos='https://cloud.r-project.org')}, error=function(e) cat('JSONLite install failed:', e$message, '\\n'))"
        
        echo "✅ R installation attempted"

    # Step 6: Run the system (skip complex setup)
    - name: 🎯 Run Enhanced Paper Trading System
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        DISPLAY: ':99'
      run: |
        echo "🚀 Running Enhanced Paper Trading System"
        echo "=========================================="
        echo "Current time: $(date)"
        
        # Ultra simple runner
        cat > simple_run.py << 'EOF'
        import os
        import sys
        import subprocess
        
        # Setup
        os.environ['DISPLAY'] = ':99'
        sys.path.insert(0, os.getcwd())
        
        print("=" * 60)
        print("STARTING ENHANCED PAPER TRADING")
        print("=" * 60)
        
        # Check R first
        print("\\nChecking R installation...")
        try:
            result = subprocess.run(['which', 'Rscript'], capture_output=True, text=True)
            if result.returncode == 0:
                print(f"✅ Rscript found: {result.stdout.strip()}")
            else:
                print("⚠️ Rscript not found, trying to install...")
                subprocess.run(['sudo', 'apt-get', 'install', '-y', 'r-base'], check=False)
        except:
            print("⚠️ R check failed")
        
        try:
            # Import
            from enhanced_paper_trading import EnhancedPaperTradingSystem
            
            # Initialize
            print("\\nInitializing system...")
            system = EnhancedPaperTradingSystem()
            print(f"✅ System initialized")
            print(f"Bankroll: €{system.bankroll:.2f}")
            
            # Try scanning
            print("\\nTrying to scan...")
            try:
                system.automated_scanning(max_scans=1)
                print("✅ Scanning done")
            except Exception as e:
                print(f"⚠️ Scanning: {e}")
            
            # Try bet resolution
            print("\\nTrying bet resolution...")
            try:
                system._resolve_pending()
                print("✅ Bet resolution done")
            except Exception as e:
                print(f"⚠️ Bet resolution: {e}")
            
            # Show status
            print("\\nFinal status:")
            pending = len(system.db.get_pending_bets())
            print(f"Pending bets: {pending}")
            print(f"Bankroll: €{system.bankroll:.2f}")
            
            print("\\n" + "=" * 60)
            print("✅ WORKFLOW COMPLETED")
            print("=" * 60)
            
        except Exception as e:
            print(f"\\n❌ ERROR: {e}")
            import traceback
            traceback.print_exc()
            
            # Try one more time with basic import
            print("\\n=== TRYING BASIC IMPORT ===")
            try:
                import importlib.util
                spec = importlib.util.spec_from_file_location("ept", "enhanced_paper_trading.py")
                module = importlib.util.module_from_spec(spec)
                spec.loader.exec_module(module)
                
                system = module.EnhancedPaperTradingSystem()
                print(f"Basic import worked! Bankroll: €{system.bankroll:.2f}")
            except:
                print("Basic import also failed")
        
        EOF
        
        # Run it
        echo "\\n=== EXECUTING ==="
        python simple_run.py
        
        echo "\\n🏁 Workflow execution finished!"
