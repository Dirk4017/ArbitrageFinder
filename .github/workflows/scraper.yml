name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true  # Try with LFS

    # Step 2: Force download if missing
    - name: 📥 ENSURE bet_resolver.R exists
      run: |
        echo "=== Ensuring bet_resolver.R exists ==="
        
        # Check if file exists from checkout
        if [ -f "bet_resolver.R" ] && [ -s "bet_resolver.R" ]; then
            echo "✅ File exists from checkout"
            ls -la bet_resolver.R
        else
            echo "❌ File missing, downloading..."
            
            # Try Git LFS if installed
            if command -v git-lfs &> /dev/null; then
                echo "Trying Git LFS..."
                git lfs pull --include="bet_resolver.R" 2>&1 || echo "LFS pull failed"
            fi
            
            # Force checkout
            git checkout HEAD -- bet_resolver.R 2>&1 || echo "Git checkout failed"
            
            # Final check
            if [ -f "bet_resolver.R" ]; then
                echo "✅ File restored"
            else
                echo "❌ Still missing, using GitHub API..."
                curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Accept: application/vnd.github.v3.raw" \
                  -o bet_resolver.R \
                  "https://api.github.com/repos/Dirk4017/ArbitrageFinder/contents/bet_resolver.R"
                
                if [ ! -f "bet_resolver.R" ] || [ ! -s "bet_resolver.R" ]; then
                    echo "❌❌ CRITICAL: Cannot get bet_resolver.R"
                    echo "Creating emergency version..."
                    echo "# Emergency R script" > bet_resolver.R
                    echo "resolve_bet <- function(p,m,l) { return(list(result=TRUE)) }" >> bet_resolver.R
                fi
            fi
        fi
        
        echo "Final status:"
        ls -la bet_resolver.R
        echo "First 3 lines:"
        head -3 bet_resolver.R

    # Step 3: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 4: Install system dependencies
    - name: 🔧 Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential r-base
        
        # Install Git LFS if needed
        sudo apt-get install -y git-lfs
        git lfs install

    # Step 5: Setup Chrome
    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # Step 6: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0

    # Step 7: Run scanner
    - name: 🎯 Run Scanner
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions scraper..."
        echo "Final file check:"
        ls -la bet_resolver.R
        python main.py
