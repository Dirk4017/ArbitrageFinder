name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install Chrome
    - name: 🌐 Install Chrome
      run: |
        echo "=== Installing Chrome ==="
        sudo apt-get update
        sudo apt-get install -y wget xvfb
        
        # Install Chrome with dependencies
        wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt-get install -y ./tmp/chrome.deb || true
        sudo apt-get install -f -y
        
        # Start Xvfb for headless Chrome
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        echo "DISPLAY=:99" >> $GITHUB_ENV
        
        echo "✅ Chrome installed"

    # Step 4: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install rich==12.6.0
        pip install webdriver-manager==4.0.1

    # Step 5: Install R with proper permissions
    - name: 📦 Install R
      run: |
        echo "=== Installing R ==="
        
        # Install R with minimal setup
        sudo apt-get install -y r-base r-base-dev
        
        # Create user library directory
        mkdir -p ~/.R/library
        
        # Set permissions and install jsonlite to user directory
        Rscript -e '
        # Create user library if it doesnt exist
        dir.create(Sys.getenv("R_LIBS_USER"), showWarnings = FALSE, recursive = TRUE)
        
        # Install jsonlite to user directory
        install.packages(
          "jsonlite", 
          repos = "https://cloud.r-project.org",
          lib = Sys.getenv("R_LIBS_USER"),
          quiet = TRUE
        )
        
        # Verify installation
        if (require("jsonlite", quietly = TRUE, character.only = TRUE)) {
          cat("✅ jsonlite installed successfully\n")
        } else {
          cat("❌ jsonlite installation failed\n")
        }
        '
        
        # Add R_LIBS_USER to environment
        echo "R_LIBS_USER=~/R/x86_64-pc-linux-gnu-library/4.3" >> $GITHUB_ENV
        echo "R_LIBS_USER=$(Rscript -e 'cat(Sys.getenv(\"R_LIBS_USER\"))')" >> $GITHUB_ENV
        
        echo "✅ R installation complete"

    # Step 6: Run the system
    - name: 🎯 Run Enhanced Paper Trading System
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        DISPLAY: ':99'
        R_LIBS_USER: ${{ env.R_LIBS_USER }}
      run: |
        echo "🚀 Running Enhanced Paper Trading System"
        echo "=========================================="
        echo "Current time: $(date)"
        echo "DISPLAY: $DISPLAY"
        echo "R_LIBS_USER: $R_LIBS_USER"
        
        # Create a simple test script
        cat > test_system.py << 'EOF'
        import os
        import sys
        import subprocess
        
        print("=" * 60)
        print("TESTING SYSTEM COMPONENTS")
        print("=" * 60)
        
        # Test R installation
        print("\nTesting R...")
        try:
            result = subprocess.run(
                ['Rscript', '-e', 'library(jsonlite); cat("✅ R and jsonlite working\\n")'],
                capture_output=True,
                text=True
            )
            print(result.stdout)
            if result.stderr:
                print(f"R stderr: {result.stderr}")
        except Exception as e:
            print(f"❌ R test failed: {e}")
        
        # Test Python imports
        print("\nTesting Python imports...")
        try:
            import selenium
            import supabase
            import pandas as pd
            import numpy as np
            print("✅ All Python imports working")
        except ImportError as e:
            print(f"❌ Import error: {e}")
        
        # Try to import and run the system
        print("\nTrying to import enhanced_paper_trading...")
        try:
            sys.path.insert(0, os.getcwd())
            from enhanced_paper_trading import EnhancedPaperTradingSystem
            
            print("✅ Import successful")
            
            # Initialize system
            system = EnhancedPaperTradingSystem()
            print(f"✅ System initialized - Bankroll: €{system.bankroll:.2f}")
            
            # Quick test: check pending bets
            pending = len(system.db.get_pending_bets())
            print(f"📊 Pending bets: {pending}")
            
            # Simple scan (limited)
            print("\n📡 Running quick scan...")
            try:
                # Try to scan just one page
                from scanners.unibet_scanner import UnibetScanner
                scanner = UnibetScanner()
                print(f"✅ Scanner initialized: {scanner.__class__.__name__}")
            except Exception as e:
                print(f"⚠️ Scanner setup: {e}")
                
        except Exception as e:
            print(f"❌ Error: {e}")
            import traceback
            traceback.print_exc()
        
        print("\n" + "=" * 60)
        print("TEST COMPLETE")
        print("=" * 60)
        EOF
        
        # Run the test
        python test_system.py
        
        # Now run the actual system
        echo "\n=== RUNNING MAIN SYSTEM ==="
        
        cat > run_main.py << 'EOF'
        import os
        import sys
        sys.path.insert(0, os.getcwd())
        
        from enhanced_paper_trading import EnhancedPaperTradingSystem
        
        def main():
            print("🚀 Starting Enhanced Paper Trading System")
            
            # Initialize
            system = EnhancedPaperTradingSystem()
            print(f"💰 Initial bankroll: €{system.bankroll:.2f}")
            
            # Resolve pending bets first
            print("\n📊 Resolving pending bets...")
            system._resolve_pending()
            
            # Run a quick scan
            print("\n🔍 Scanning for opportunities...")
            try:
                system.automated_scanning(max_scans=2)  # Limit to 2 scans for testing
                print("✅ Scan completed")
            except Exception as e:
                print(f"⚠️ Scan error: {e}")
            
            # Show final status
            print("\n📈 Final Status:")
            print(f"💰 Bankroll: €{system.bankroll:.2f}")
            pending = len(system.db.get_pending_bets())
            print(f"⏳ Pending bets: {pending}")
            
            # Show recent bets if any
            if pending > 0:
                print("\n📋 Recent pending bets:")
                bets = system.db.get_pending_bets()
                for bet in bets[:3]:  # Show first 3
                    print(f"  - {bet['team1']} vs {bet['team2']} ({bet['bet_type']})")
            
            print("\n✅ System run completed!")
        
        if __name__ == "__main__":
            try:
                main()
            except Exception as e:
                print(f"❌ Critical error: {e}")
                import traceback
                traceback.print_exc()
                sys.exit(1)
        EOF
        
        # Execute main system
        python run_main.py
        
        echo "\n🏁 Workflow execution completed!"
