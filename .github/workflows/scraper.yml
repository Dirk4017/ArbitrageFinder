name: Daily Sports Bet Scanner

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  scan-for-opportunities:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Step 3: Install system dependencies
    - name: 🔧 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev build-essential
        
        # Install R
        sudo apt-get install -y r-base r-base-dev
        
        # Verify
        echo "R version:"
        R --version || echo "R check failed"
        echo "Rscript:"
        which Rscript || echo "Rscript not found"

    # Step 3.5: Install R packages (CRITICAL - ADD THIS!)
    - name: 📦 Install R packages
      run: |
        echo "Installing R packages for bet resolution..."
        
        # Set CRAN mirror
        Rscript -e "options(repos = c(CRAN = 'https://cloud.r-project.org'))"
        
        # Install required packages
        Rscript -e "install.packages('nflreadr')"
        Rscript -e "install.packages('hoopR')"
        Rscript -e "install.packages('jsonlite')"
        Rscript -e "install.packages('httr')"
        Rscript -e "install.packages('dplyr')"
        Rscript -e "install.packages('lubridate')"
        Rscript -e "install.packages('stringr')"
        
        # Verify installation
        echo "Verifying R packages..."
        Rscript -e "
          packages <- c('nflreadr', 'hoopR', 'jsonlite', 'httr', 'dplyr', 'lubridate', 'stringr')
          for (pkg in packages) {
            if (require(pkg, character.only = TRUE)) {
              cat(paste0('✓ ', pkg, ' loaded successfully\\n'))
            } else {
              cat(paste0('✗ ', pkg, ' FAILED to load\\n'))
            }
          }
        "

    # Step 4: Setup Chrome
    - name: 🌐 Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # Step 5: Install Python packages
    - name: 📦 Install Python packages
      run: |
        pip install --upgrade pip
        pip install selenium==4.15.0
        pip install python-dotenv==1.0.0
        pip install requests==2.31.0
        pip install supabase==1.1.1
        pip install fuzzywuzzy==0.18.0
        pip install python-Levenshtein==0.25.1
        pip install pandas==1.5.0
        pip install numpy==1.24.0
        pip install beautifulsoup4==4.11.0
        pip install lxml==4.9.0
        pip install rich==12.6.0

    # Step 6: Run the dedicated runner script
    - name: 🎯 Run Automated Scanner (Options 1 & 5)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "🚀 Starting GitHub Actions - Running Options 1 & 5"
        echo "=================================================="
        python github_actions_runner.py
